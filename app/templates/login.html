<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brokr — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface-hover: #222222;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --text-dim: #888888;
      --teal: #01696f;
      --teal-light: #028a92;
      --red: #ef4444;
      --red-dim: rgba(239,68,68,0.12);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --radius: 8px;
    }
    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 36px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      justify-content: center;
    }
    .logo { width: 32px; height: 32px; }
    .app-name {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-dim);
      margin-bottom: 6px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 1rem;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="password"]:focus {
      border-color: var(--teal);
    }
    .btn {
      width: 100%;
      padding: 10px 16px;
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }
    .btn:hover { background: var(--teal-light); }
    .error-msg {
      background: var(--red-dim);
      color: var(--red);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: var(--radius);
      padding: 8px 12px;
      font-size: 0.875rem;
      margin-bottom: 16px;
      display: none;
    }
    .error-msg.visible { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-row">
      <svg class="logo" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="28" height="28" rx="6" fill="#01696f"/>
        <path d="M7 19V9h3l3 6 3-6h3v10h-2.5v-6l-2.5 5h-2l-2.5-5v6H7z" fill="#fff"/>
      </svg>
      <span class="app-name">Brokr</span>
    </div>

    <div id="error-msg" class="error-msg {% if error %}visible{% endif %}">{{ error or "Incorrect password" }}</div>

    <form method="POST" action="/login">
      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter password"
          autofocus
          required
        >
      </div>
      <button type="submit" class="btn">Sign in</button>
    </form>
  </div>

  <script>
    // Show error if server returned failedattempt=yes or error is set in context
    const params = new URLSearchParams(window.location.search);
    if (params.get('failedattempt') === 'yes') {
      document.getElementById('error-msg').classList.add('visible');
      document.getElementById('password').focus();
    }
  </script>
</body>
</html>
