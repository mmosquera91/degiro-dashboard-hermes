<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brokr — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="/static/style.css?v={{ asset_v }}">
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-logo-row">
      <img src="/static/logo.svg" alt="Brokr" class="login-logo">
    </div>

    <div id="error-msg" class="login-error {% if error %}visible{% endif %}"
         role="alert" aria-live="assertive">{{ (error or "Incorrect password") | e }}</div>

    <form method="POST" action="/login">
      <div class="login-form-group">
        <label class="login-label" for="password">Password</label>
        <input
          class="login-input"
          type="password"
          id="password"
          name="password"
          placeholder="Enter password"
          autocomplete="current-password"
          autofocus
          required
          aria-describedby="error-msg"
        >
      </div>
      <button type="submit" class="btn btn-primary btn-block login-submit">
        <span class="spinner" aria-hidden="true"></span><span class="btn-label">Unlock</span>
      </button>
    </form>
  </div>

  <!-- External script: the page CSP (script-src 'self') blocks inline scripts,
       so this lives in /static/login.js like the dashboard's app.js. -->
  <script src="/static/login.js?v={{ asset_v }}"></script>
</body>
</html>
