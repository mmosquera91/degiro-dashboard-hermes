services:
  brokr:
    build: .
    container_name: brokr
    network_mode: host
    environment:
      - HOST=0.0.0.0
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - brokr_snapshots:/data/snapshots
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/health'); raise SystemExit(0 if r.status_code == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  brokr_snapshots:
