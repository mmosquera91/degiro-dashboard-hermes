services:
  brokr:
    image: ghcr.io/mmosquera91/degiro-dashboard-hermes:latest
    container_name: brokr
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
    env_file:
      - .env
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      # Mount the whole data dir so watchlist.json / symbol_overrides.json
      # survive container recreation — not just snapshots.
      - ./data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/health'); raise SystemExit(0 if r.status_code == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
